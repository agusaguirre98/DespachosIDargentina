name: Backend CI

on:
  push:
    paths:
      - 'apps/backend/**'
  pull_request:
    paths:
      - 'apps/backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements.txt
      - name: Lint
        run: |
          pip install black isort ruff
          black --check apps/backend/src
          isort --check-only apps/backend/src
          ruff check apps/backend/src
      - name: Tests
        run: |
          pytest apps/backend/tests || echo 'No hay tests aún'
